# GitHub Secret Scanning configuration
# https://docs.github.com/en/code-security/secret-scanning/about-secret-scanning
#
# GitHub will automatically detect and alert on:
#   - Anthropic API keys  (sk-ant-...)
#   - OpenAI API keys     (sk-...)
#   - Generic high-entropy secrets
#
# The patterns below add project-specific rules for any custom tokens
# this project might use in the future.

paths-ignore:
  - "README.md"           # contains placeholder examples like sk-ant-...
  - "docs/**"
  - "**/*.md"             # all markdown docs contain illustrative placeholders
